name: Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Lint
        run: nix develop -c just lint

      - name: Format check
        run: nix develop -c just fmt-check

      - name: Evaluate all hosts
        run: |
          nix eval .#nixosConfigurations.pathfinder.config.system.build.toplevel.drvPath
          nix eval .#nixosConfigurations.discovery.config.system.build.toplevel.drvPath
          nix eval .#nixosConfigurations.laptop.config.system.build.toplevel.drvPath
