# =============================================================================
# ai-models.yml — AI Model Inference (Orion — Bazzite, AMD GPU)
# Services: llama-chat (Qwen 3.5 27B IQ4_XS, Vulkan GPU)
#
# Prerequisites:
#   - AMD GPU with Vulkan support (/dev/dri)
#   - GGUF model file downloaded to ${MODELS_PATH}:
#     ${MODELS_PATH}/${LLAMA_CHAT_MODEL}
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

x-restart: &restart
  restart: unless-stopped

networks:
  homelab-net:
    external: true

services:
  # ---------------------------------------------------------------------------
  # llama-chat — Qwen 3.5 27B chat model (Vulkan GPU)
  # Matches reference model.qwen.yaml configuration
  # ---------------------------------------------------------------------------
  llama-chat:
    image: llama-server-vulkan:pr21038
    container_name: llama-chat
    <<: *restart
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - RADV_PERFTEST=nogttspill
    command:
      - -m
      - "${MODELS_PATH}/${LLAMA_CHAT_MODEL}"
      - -c
      - "32768"
      - --batch-size
      - "1024"
      - --ubatch-size
      - "512"
      - --parallel
      - "1"
      - -ngl
      - "999"
      # - -fa
      # - "on"
      - -t
      - "16"
      - --no-mmap
      - -ctk
      - "q8_0"
      - -ctv
      - "q8_0"
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0.00"
      - --jinja
      - --chat-template-kwargs
      - '{"enable_thinking":true}'
    volumes:
      - ${MODELS_PATH:-/opt/models}:${MODELS_PATH:-/opt/models}:z
    ports:
      - "8503:8080"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging: *logging

  # ---------------------------------------------------------------------------
  # llama-embed — Qwen3-Embedding-0.6B (CPU-only, no GPU needed)
  # Uses pooling=last for Qwen3-Embedding models
  # Available 24/7 alongside chat model (lightweight, ~0.6GB)
  # ---------------------------------------------------------------------------
  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: llama-embed
    <<: *restart
    environment:
      LLAMA_ARG_HOST: 0.0.0.0
    command:
      - -m
      - "${MODELS_PATH}/${EMBED_MODEL}"
      - --port
      - "8081"
      - -ngl
      - "0"
      - --embedding
      - --pooling
      - "last"
      - -ub
      - "8192"
    volumes:
      - ${MODELS_PATH:-/opt/models}:${MODELS_PATH:-/opt/models}:z
    ports:
      - "8501:8081"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *logging
