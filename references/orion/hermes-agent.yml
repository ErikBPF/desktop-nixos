# =============================================================================
# hermes-agent.yml — Hermes Agent stack (M1 Workstation)
# Services: hermes-agent (autonomous self-improving AI agent)
#
# Hermes Agent is an open-source AI agent by Nous Research with persistent
# multi-level memory, self-improving skills, and session search. Runs as a
# headless gateway exposing an OpenAI-compatible API + webhook endpoint.
#
# First-run:
#   1. Build image:
#      docker compose -f hermes-agent.yml build
#   2. Edit config/hermes-agent/config.yaml with your LiteLLM endpoint
#   3. Set API keys in .env (OPENAI_API_KEY for LiteLLM, messaging tokens)
#   4. docker compose -f hermes-agent.yml up -d
#   5. API at http://<host>:8642, webhooks at http://<host>:8644
#
# Docs: https://github.com/NousResearch/hermes-agent
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped

networks:
  homelab-net:
    external: true

volumes:
  hermes_data:

services:
  # ---------------------------------------------------------------------------
  # Hermes Agent — autonomous AI agent with persistent memory
  # Port 8642: OpenAI-compatible API server
  # Port 8644: Webhook endpoint
  # Config at ./config/hermes-agent/
  # Uses LiteLLM on Discovery as model gateway
  # ---------------------------------------------------------------------------
  hermes-agent:
    build:
      context: .
      dockerfile: config/hermes-agent/Dockerfile
    image: hermes-agent:local
    container_name: hermes-agent
    <<: *restart
    environment:
      - HERMES_HOME=/data
      - OPENAI_API_KEY=${LITELLM_API_KEY:-}
      - OPENAI_BASE_URL=https://litellm.homelab.pastelariadev.com/v1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
    volumes:
      - ./config/hermes-agent/config.yaml:/data/config.yaml:ro
      - ./config/hermes-agent/SOUL.md:/data/SOUL.md:ro
      - hermes_data:/data
    ports:
      - "8642:8642"    # API server (OpenAI-compatible)
      - "8644:8644"    # Webhooks
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8642/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *logging
