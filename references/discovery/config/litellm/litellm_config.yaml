# LiteLLM proxy configuration — Discovery (24/7 Infrastructure)
# Routes requests to remote model servers via Tailscale/LAN
# Pricing based on OpenRouter (chat) and Azure text-embedding-3-large (embed)
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # Chat / Completion — remote on Orion via Tailscale
  # Offline at night (gaming mode) — LiteLLM returns graceful error
  # Model: Qwen 3.5 27B IQ4_XS (bartowski), q8_0 KV cache, 32k context
  # Server: llama.cpp PR#21038 (Hadamard rotation for better KV quantization)
  # Pricing: OpenRouter Qwen 3.5 27B rates
  - model_name: qwen-chat
    litellm_params:
      model: openai/qwen-chat
      api_base: http://100.108.122.70:8503/v1
      api_key: sk-no-key-required
      timeout: 600
    model_info:
      input_cost_per_token: 0.000000195
      output_cost_per_token: 0.00000156
      max_tokens: 32768
      mode: chat

  # Embeddings — remote on Orion (CPU-only, lightweight, always available)
  # Pricing: Azure text-embedding-3-large rates (proxy for local Qwen embed)
  - model_name: qwen-embed
    litellm_params:
      model: openai/qwen-embed
      api_base: http://100.108.122.70:8501/v1
      api_key: sk-no-key-required
    model_info:
      input_cost_per_token: 0.00000013
      output_cost_per_token: 0.0
      max_tokens: 32768
      mode: embedding

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_connection_pool_limit: 10
  proxy_batch_write_at: 60
  allow_requests_on_db_unavailable: true
  disable_error_logs: true
  success_callback: ["langfuse"]
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  background_health_checks: false

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  request_timeout: 600
  store_model_messages: true
