global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- Local (Discovery) ---
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: crowdsec
    static_configs:
      - targets: ['crowdsec:6060']

  # --- Remote (Kepler via Tailscale) ---
  - job_name: kepler
    static_configs:
      - targets: ['kepler:9100']
        labels:
          host: kepler

  # --- Remote (Orion via Tailscale) ---
  - job_name: orion
    static_configs:
      - targets: ['orion:9100']
        labels:
          host: orion

  # --- Remote (Voyager via Tailscale) ---
  - job_name: voyager
    static_configs:
      - targets: ['voyager:9100']
        labels:
          host: voyager
