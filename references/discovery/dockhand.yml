# =============================================================================
# dockhand.yml — Docker Management stack (Machine 3: m3-infra)
# Services: Dockhand (modern Docker management UI)
#
# Self-hosted Docker management platform replacing Portainer.
# Visual Compose editor, GitOps auto-sync, container metrics,
# OIDC/SSO, MFA, vulnerability scanning, and multi-host support.
#
# First-run:
#   1. just stack-up dockhand
#   2. Visit http://<host>:3018
#   3. Create admin account
#   4. Add Docker socket as endpoint
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

volumes:
  dockhand_data:

services:
  # ---------------------------------------------------------------------------
  # Dockhand — modern Docker management UI (Portainer replacement)
  # Visual Compose editor, GitOps, container metrics, OIDC/SSO, vulnerability scanning
  # ---------------------------------------------------------------------------
  dockhand:
    image: fnsys/dockhand:v1.0.18
    container_name: dockhand
    <<: *restart
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand_data:/data
    ports:
      - "3018:3000"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging
