# =============================================================================
# infra.yml — Core Infrastructure stack (Machine 3: m3-infra)
# Services: PostgreSQL 18, Redis 8, Vault, Vaultwarden
#
# This is the foundation for the entire homelab. Start before all other stacks
# (except networking). Remote services on M1/M2 reach Postgres and Redis via
# Tailscale MagicDNS (hostname: m3-infra).
#
# Postgres port is exposed on all interfaces (5432:5432) so M2 services can
# connect via Tailscale. Security is handled by Tailscale ACLs.
#
# Postgres databases are provisioned by scripts/provision-db.sql on first start.
#
# Redis DB assignments:
#   DB 0 — Open WebUI
#   DB 1 — n8n queue
#   DB 2 — Seerr
#   DB 3 — Langfuse
#
# Note: qdrant, minio, pgadmin have moved to M2.
# Note: Authentik dropped; Vaultwarden replaces the auth stack.
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

volumes:
  postgres_data:
  redis_data:
  vault_data:
  vaultwarden_data:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18 — shared database for all apps
  # Exposed on all interfaces for cross-machine access via Tailscale
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    container_name: postgres
    <<: *restart
    mem_limit: 2g
    cpus: 2.0
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/provision-db.sql:/docker-entrypoint-initdb.d/provision.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab-net
    ports:
      - "5432:5432"
    logging: *logging

  # ---------------------------------------------------------------------------
  # Redis 8 — shared cache and queue backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    <<: *restart
    mem_limit: 512m
    cpus: 1.0
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab-net
    logging: *logging

  # ---------------------------------------------------------------------------
  # Vault — secrets management
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.21.4
    container_name: vault
    <<: *restart
    command: server -dev -dev-listen-address=0.0.0.0:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-devtoken}
      VAULT_ADDR: "http://127.0.0.1:8200"
      TZ: ${TZ}
    ports:
      - "8200:8200"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Vaultwarden — lightweight Bitwarden-compatible password manager
  # ---------------------------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:1.35.4
    container_name: vaultwarden
    <<: *restart
    environment:
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
      WEBSOCKET_ENABLED: "true"
      DOMAIN: https://vault.${HOMELAB_DOMAIN}
      TZ: ${TZ}
      SIGNUPS_ALLOWED: "true"
    volumes:
      - vaultwarden_data:/data
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/alive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging
