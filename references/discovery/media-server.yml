# =============================================================================
# media-server.yml — Media Server Stack
# Machine: Discovery (Debian — 24/7 Infrastructure)
#
# Services: Jellyfin (NVIDIA GPU), Jellystat, Kometa
#
# Jellyfin uses NVIDIA Quadro P2000 for hardware transcoding (NVENC/NVDEC).
# Jellystat uses the local Discovery Postgres instance.
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

services:
  # ---------------------------------------------------------------------------
  # Jellyfin — open-source media server
  # Hardware transcoding via NVIDIA Quadro P2000 (NVENC/NVDEC)
  # ---------------------------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.6
    container_name: jellyfin
    <<: *restart
    mem_limit: 4g
    cpus: 4.0
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ${APPS_PATH}/jellyfin:/config
      - ${MEDIA_PATH}:/media:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8096:8096"
      - "7359:7359/udp"
      - "1900:1900/udp"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging

  # ---------------------------------------------------------------------------
  # Jellystat — Jellyfin analytics and statistics
  # Uses local Discovery Postgres (container name 'postgres')
  # ---------------------------------------------------------------------------
  jellystat:
    image: cyfershepard/jellystat:1.1.8
    container_name: jellystat
    <<: *restart
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_IP=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=jellystat
      - JWT_SECRET=${JELLYSTAT_JWT_SECRET}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/jellystat:/app/backend/backup-data
    ports:
      - "3006:3000"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging

  # ---------------------------------------------------------------------------
  # Kometa — metadata and poster art manager
  # Runs as a one-shot job on startup, then exits
  # ---------------------------------------------------------------------------
  kometa:
    image: kometateam/kometa:v2.3.0
    container_name: kometa
    restart: "no"
    environment:
      - TZ=${TZ}
      - KOMETA_RUN=true
    volumes:
      - ${APPS_PATH}/kometa:/config
      - ${MEDIA_PATH}:/media:ro
    networks:
      - homelab-net
    logging: *logging
