# =============================================================================
# shared.yml — Shared utility services (Machine 3: m3-infra)
# Services: Syncthing (P2P file sync), docker-prune (cleanup scheduler)
#
# Syncthing runs as a lightweight sync node (no media mounts — M3 has no
# media storage). Config and data volumes only.
#
# docker-prune runs weekly to clean up dangling images and stopped containers.
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

volumes:
  syncthing_config:
  syncthing_data:

services:
  # ---------------------------------------------------------------------------
  # Syncthing — P2P file sync (lightweight node, no media)
  # ---------------------------------------------------------------------------
  syncthing:
    image: lscr.io/linuxserver/syncthing:2.0.15
    container_name: syncthing
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - syncthing_config:/config
      - syncthing_data:/data
    ports:
      - "8384:8384"                    # admin UI
      - "22000:22000/tcp"              # sync protocol TCP
      - "22000:22000/udp"              # sync protocol UDP
      - "21027:21027/udp"              # local discovery
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8384/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # docker-prune — weekly cleanup of dangling images and stopped containers
  # ---------------------------------------------------------------------------
  docker-prune:
    image: docker:cli
    container_name: docker-prune
    <<: *restart
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        sleep 604800;
        echo "[$(date)] Weekly prune starting on discovery...";
        PRUNE=$(docker system prune -f --filter "until=168h" 2>&1);
        echo "$PRUNE";
        IMAGES=$(docker image prune -f --filter "dangling=true" 2>&1);
        echo "$IMAGES";
        wget -qO- --post-data="Weekly prune on discovery complete. $PRUNE $IMAGES" http://ntfy/homelab-maintenance 2>/dev/null || true;
        echo "[$(date)] Weekly prune complete.";
      done'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - homelab-net
    logging: *logging
