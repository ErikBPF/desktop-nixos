# =============================================================================
# sync.yml — File Sync Hub
# Machine: Discovery (Debian — 24/7 Infrastructure)
#
# Services: Syncthing (P2P file sync hub)
#
# Discovery acts as the always-on hub/introducer for Syncthing.
# All devices (Orion, Kepler, etc.) sync through Discovery via Tailscale.
# No local writes originate from this node — it relays between peers.
#
# Public discovery, relay, and NAT are disabled (Tailscale handles connectivity).
# Devices connect via static addresses: tcp://orion:22000, tcp://kepler:22000
#
# First-run:
#   1. docker compose -f sync.yml --env-file .env up -d
#   2. Access GUI via https://syncthing.homelab.pastelariadev.com or SSH tunnel
#   3. Set GUI password, add devices, configure folders
#   4. Mark Discovery as "introducer" on each remote device
#
# Config: ${APPS_PATH}/syncthing
# Data:   ${MEDIA_PATH}/syncthing
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

services:
  # ---------------------------------------------------------------------------
  # Syncthing — P2P file sync hub (always-on introducer node)
  # GUI: localhost:8384 (behind SWAG at syncthing.homelab.pastelariadev.com)
  # Sync: 22000/tcp+udp (Tailscale direct connections)
  # ---------------------------------------------------------------------------
  syncthing:
    image: lscr.io/linuxserver/syncthing:2.0.15
    container_name: syncthing
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/syncthing:/config
      - ${MEDIA_PATH}/syncthing:/data
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
    networks:
      - homelab-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8384/rest/noauth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *logging
