# =============================================================================
# monitoring.yml — LGTM Observability & Alerting stack (Machine 3: m3-infra)
# Services: Prometheus, Grafana, Loki, Mimir, Tempo, Alloy,
#           Uptime Kuma, ntfy, Healthchecks, Scrutiny (SMART disk health)
#
# Central monitoring for the entire homelab. Prometheus and Alloy scrape
# metrics from local containers and remote services on M1/M2 via Tailscale
# MagicDNS (configured in their respective config files, not here).
#
# ntfy is the central notification bus. All services push to ntfy topics:
#   http://ntfy/homelab-alerts     -> Uptime Kuma, Scrutiny
#   http://ntfy/homelab-backups    -> Ofelia (via sync stack on M2)
#
# Healthchecks is a dead-man's switch: cron jobs ping it on success.
#   If a ping is missed (backup failed silently), you get an alert.
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  mimir_data:
  tempo_data:
  healthchecks_data:
  scrutiny_config:
  scrutiny_influxdb_data:

services:
  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraper
  # Scrapes: Alloy and app /metrics endpoints (local + remote via Tailscale)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    <<: *restart
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and alerts
  # Import dashboard ID 15120 on first run (Docker + host monitoring)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.3.5
    container_name: grafana
    <<: *restart
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_SERVER_ROOT_URL=https://grafana.${HOMELAB_DOMAIN}
      # Telegram alert contact point
      - GF_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - homelab-net
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.12
    container_name: loki
    <<: *restart
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - /home/erik/vault/docker-data/loki:/loki
    networks:
      - homelab-net
    healthcheck:
      test: ["NONE"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Mimir — long-term metrics storage (LGTM stack)
  # ---------------------------------------------------------------------------
  mimir:
    image: grafana/mimir:3.0.4
    container_name: mimir
    <<: *restart
    command: -config.file=/etc/mimir/mimir.yaml
    volumes:
      - mimir_data:/mimir
      - ./config/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
    networks:
      - homelab-net
    healthcheck:
      test: ["NONE"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Tempo — distributed tracing backend (LGTM stack)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.10.3
    container_name: tempo
    <<: *restart
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - tempo_data:/var/tempo
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    networks:
      - homelab-net
    healthcheck:
      test: ["NONE"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Grafana Alloy — unified telemetry collector
  # Replaces Promtail + node-exporter + cAdvisor with a single agent
  # Collects logs, host metrics, and container metrics, ships to Loki + Prometheus
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.14.1
    container_name: alloy
    <<: *restart
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/12345' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *logging

  # ---------------------------------------------------------------------------
  # Uptime Kuma — HTTP/TCP/DNS uptime monitoring with push alerts
  # Add monitors for every service port after first launch.
  # Configure ntfy as notification channel: http://ntfy/homelab-alerts
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    <<: *restart
    volumes:
      - ./config/uptime-kuma:/app/data
    ports:
      - "3002:3001"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # ntfy — self-hosted push notification server
  # Central notification bus for the entire homelab.
  # Mobile: install ntfy app -> subscribe to topics:
  #   homelab-alerts, homelab-updates, homelab-backups
  # Services push to: http://ntfy/<topic>
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.19
    container_name: ntfy
    <<: *restart
    command: serve
    environment:
      - TZ=${TZ}
      - NTFY_BASE_URL=${NTFY_BASE_URL}
      - NTFY_UPSTREAM_BASE_URL=https://ntfy.sh # enables iOS push via ntfy.sh relay
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all # require auth for publishing
    volumes:
      - ./config/ntfy:/etc/ntfy:ro
      - ./config/ntfy/cache:/var/cache/ntfy
    ports:
      - "8070:80"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Healthchecks.io (self-hosted) — dead man's switch for cron jobs
  # Ofelia backup jobs ping a Healthchecks URL on success.
  # If the ping is missed, Healthchecks sends a Telegram/ntfy alert.
  # Visit https://healthchecks.<HOMELAB_DOMAIN> after first start.
  # ---------------------------------------------------------------------------
  healthchecks:
    image: lscr.io/linuxserver/healthchecks:4.1.1
    container_name: healthchecks
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SECRET_KEY=${HEALTHCHECKS_SECRET_KEY}
      - SITE_ROOT=${HEALTHCHECKS_SITE_ROOT}
      - SITE_NAME=Homelab Healthchecks
      - ALLOWED_HOSTS=${HEALTHCHECKS_ALLOWED_HOSTS},localhost,127.0.0.1
      - SUPERUSER_EMAIL=${HEALTHCHECKS_SUPERUSER_EMAIL}
      - SUPERUSER_PASSWORD=${HEALTHCHECKS_SUPERUSER_PASSWORD}
      # Telegram integration (for missed-ping alerts)
      - TELEGRAM_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Disable signups after creating your account
      - REGISTRATION_OPEN=False
    volumes:
      - healthchecks_data:/config
    ports:
      - "8084:8000"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:8000/ | grep -q 302 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Scrutiny — SMART disk health monitoring (omnibus: web + collector + InfluxDB)
  # Hub for the entire homelab. Remote collectors on M1/M2/M4 report here.
  # Dashboard: http://discovery:8080
  # Notifications via ntfy on disk health issues.
  # ---------------------------------------------------------------------------
  scrutiny-influxdb:
    image: influxdb:2.2
    container_name: scrutiny-influxdb
    <<: *restart
    mem_limit: 1g
    cpus: 1.0
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=scrutiny
      - DOCKER_INFLUXDB_INIT_PASSWORD=${SCRUTINY_INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=homelab
      - DOCKER_INFLUXDB_INIT_BUCKET=scrutiny
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${SCRUTINY_INFLUXDB_TOKEN}
    volumes:
      - scrutiny_influxdb_data:/var/lib/influxdb2
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "influx ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    <<: *restart
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    ports:
      - "8080:8080"
    environment:
      - SCRUTINY_WEB_INFLUXDB_HOST=scrutiny-influxdb
      - SCRUTINY_WEB_INFLUXDB_PORT=8086
      - SCRUTINY_WEB_INFLUXDB_TOKEN=${SCRUTINY_INFLUXDB_TOKEN}
      - SCRUTINY_WEB_INFLUXDB_ORG=homelab
      - SCRUTINY_WEB_INFLUXDB_BUCKET=scrutiny
      - COLLECTOR_CRON_SCHEDULE=0 */6 * * *
      - COLLECTOR_HOST_ID=discovery
      # ntfy notifications for disk health alerts
      - SCRUTINY_NOTIFY_URLS=ntfy://ntfy/homelab-alerts
    volumes:
      - /run/udev:/run/udev:ro
      - scrutiny_config:/opt/scrutiny/config
    # TODO: Add Discovery drive devices after deployment. Example:
    devices:
      - /dev/sda
      - /dev/sdb
      - /dev/sdc
    depends_on:
      - scrutiny-influxdb
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging
