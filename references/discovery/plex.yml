# =============================================================================
# plex.yml — Plex Media Server Stack
# Machine: Discovery (Debian — 24/7 Infrastructure)
#
# Services: Plex (NVIDIA GPU), Tautulli
#
# Plex uses network_mode: host for GDM (LAN discovery).
# NVIDIA Quadro P2000 provides hardware transcoding (NVENC/NVDEC).
#
# PLEX_CLAIM: get a fresh token from plex.tv/claim (valid 4 minutes)
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

services:
  # ---------------------------------------------------------------------------
  # Plex — media server with NVIDIA GPU transcoding
  # network_mode: host required for GDM/Bonjour LAN discovery
  # ---------------------------------------------------------------------------
  plex:
    image: lscr.io/linuxserver/plex:1.43.0
    container_name: plex
    <<: *restart
    mem_limit: 4g
    cpus: 4.0
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ${APPS_PATH}/plex:/config
      - ${MEDIA_PATH}:/data:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:32400/identity || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *logging

  # ---------------------------------------------------------------------------
  # Tautulli — Plex analytics, watch history, notifications
  # Reaches Plex via host network (localhost:32400)
  # ---------------------------------------------------------------------------
  tautulli:
    image: lscr.io/linuxserver/tautulli:2.16.1
    container_name: tautulli
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/tautulli:/config
    ports:
      - "8181:8181"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging
