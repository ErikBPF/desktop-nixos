# =============================================================================
# media.yml — Media Acquisition Stack
# Machine: Discovery (Debian — 24/7 Infrastructure)
#
# Services: Gluetun (NordVPN), qBittorrent, Prowlarr, Flaresolverr,
#           Sonarr, Radarr, Lidarr, Listenarr, Recyclarr, Unpackerr,
#           Decluttarr, Autobrr, Seerr
#
# VPN topology:
#   Behind Gluetun (VPN required): qBittorrent, Prowlarr, Flaresolverr
#   Direct on homelab-net (no VPN): Sonarr, Radarr, Lidarr, others
#
# DB connections: *arr apps use local postgres (container name 'postgres');
#                 Listenarr uses embedded SQLite
# Media paths: ${MEDIA_PATH} for all media storage
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

volumes:
  recyclarr_data:
  gluetun_data:

services:
  # ---------------------------------------------------------------------------
  # Gluetun — NordVPN OpenVPN gateway
  # ---------------------------------------------------------------------------
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    <<: *restart
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${NORDVPN_USER}
      - OPENVPN_PASSWORD=${NORDVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      - FIREWALL_OUTBOUND_SUBNETS=172.20.0.0/24,192.168.10.0/24
      - UPDATER_PERIOD=24h
    volumes:
      - gluetun_data:/gluetun
    ports:
      - "9080:9080"   # qBittorrent WebUI
      - "9696:9696"   # Prowlarr
      - "8191:8191"   # Flaresolverr
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging

  # ---------------------------------------------------------------------------
  # qBittorrent — torrent client behind VPN
  # ---------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    <<: *restart
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=9080
      - DOCKER_MODS=arafatamim/linuxserver-io-mod-vuetorrent
    volumes:
      - ${APPS_PATH}/qbittorrent:/config
      - ${MEDIA_PATH}:/media
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Prowlarr — indexer aggregator, behind VPN
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    <<: *restart
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/prowlarr:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Flaresolverr — Cloudflare bypass for Prowlarr, behind VPN
  # ---------------------------------------------------------------------------
  flaresolverr:
    image: flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    <<: *restart
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8191 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Sonarr — TV automation (NO VPN needed)
  # Postgres configured via config.xml (container name 'postgres')
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - "8989:8989"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Radarr — movie automation (NO VPN needed)
  # ---------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    container_name: radarr
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/radarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - "7878:7878"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Lidarr — music automation (NO VPN needed)
  # ---------------------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/lidarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - "8686:8686"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Listenarr — audiobook automation (NO VPN needed)
  # ---------------------------------------------------------------------------
  listenarr:
    image: ghcr.io/listenarrs/listenarr:canary
    container_name: listenarr
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/listenarr:/app/config
      - ${MEDIA_PATH}:/media
    ports:
      - "4545:4545"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4545 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Recyclarr — syncs TRaSH Guide quality profiles to Sonarr & Radarr
  # ---------------------------------------------------------------------------
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.5.1
    container_name: recyclarr
    <<: *restart
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - CRON_SCHEDULE=0 4 * * *
      - RECYCLARR_CREATE_CONFIG=false
    volumes:
      - ${APPS_PATH}/recyclarr:/config
      - recyclarr_data:/data
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "pgrep supercronic || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Unpackerr — extracts RAR/ZIP archives from completed downloads
  # ---------------------------------------------------------------------------
  unpackerr:
    image: golift/unpackerr:0.15.2
    container_name: unpackerr
    <<: *restart
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - UN_LOG_FILE=/media/downloads/unpackerr.log
      - UN_LOG_FILES=10
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_SONARR_0_PATHS_0=/media/downloads
      - UN_SONARR_0_PROTOCOLS=torrent
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_RADARR_0_PATHS_0=/media/downloads
      - UN_RADARR_0_PROTOCOLS=torrent
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LIDARR_0_API_KEY=${LIDARR_API_KEY}
      - UN_LIDARR_0_PATHS_0=/media/downloads
      - UN_LIDARR_0_PROTOCOLS=torrent
    volumes:
      - ${MEDIA_PATH}:/media
    networks:
      - homelab-net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pgrep unpackerr || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Decluttarr — removes stalled/failed/slow downloads from *arr queues
  # ---------------------------------------------------------------------------
  decluttarr:
    image: ghcr.io/manimatter/decluttarr:v2.0.0
    container_name: decluttarr
    <<: *restart
    environment:
      - TZ=${TZ}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - LIDARR_API_KEY=${LIDARR_API_KEY}
      - QBITTORRENT_USER=${QBITTORRENT_USER}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
    volumes:
      - ./config/decluttarr/config.yaml:/app/config/config.yaml:ro
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Autobrr — torrent action runner
  # ---------------------------------------------------------------------------
  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.75.1
    container_name: autobrr
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_PATH}/autobrr:/config
    ports:
      - "7474:7474"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging

  # ---------------------------------------------------------------------------
  # Seerr — media request UI
  # ---------------------------------------------------------------------------
  seerr:
    image: ghcr.io/seerr-team/seerr:3.1.0
    container_name: seerr
    <<: *restart
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LOG_LEVEL=info
    volumes:
      - ${APPS_PATH}/seerr:/app/config
    ports:
      - "5055:5055"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging
