# =============================================================================
# renovate.yml — Dependency Management stack (Machine 3: m3-infra)
# Services: Renovate (automated dependency update bot)
#
# Renovate scans your Docker Compose files for image versions and creates
# PRs when new versions are available, with changelogs and compatibility notes.
#
# Runs as a scheduled job — executes on a cron schedule, scans repos,
# creates PRs, then exits until next run.
#
# Prerequisites:
#   - A Git repository (GitHub/GitLab) containing your compose files
#   - A personal access token with repo write permissions
#   - Set RENOVATE_TOKEN and RENOVATE_REPOSITORIES in .env
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "10"

x-restart: &restart
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

networks:
  homelab-net:
    external: true

volumes:
  renovate_cache:

services:
  # ---------------------------------------------------------------------------
  # Renovate — automated dependency update bot
  # Scans compose files for Docker image versions, creates PRs for updates
  # Runs on cron schedule via Ofelia or standalone timer
  # ---------------------------------------------------------------------------
  renovate:
    image: renovate/renovate:43.99.0
    container_name: renovate
    <<: *restart
    environment:
      LOG_LEVEL: info
      RENOVATE_TOKEN: ${RENOVATE_TOKEN:-}
      RENOVATE_REPOSITORIES: ${RENOVATE_REPOSITORIES:-}
      RENOVATE_PLATFORM: ${RENOVATE_PLATFORM:-github}
      RENOVATE_AUTODISCOVER: "false"
      RENOVATE_ONBOARDING: "true"
      # Run every 6 hours
      RENOVATE_SCHEDULE: "every 6 hours"
    volumes:
      - renovate_cache:/tmp/renovate
    networks:
      - homelab-net
    logging: *logging
